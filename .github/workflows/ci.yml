name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest httpx
      - name: Run backend tests if present
        run: |
          if [ -d backend/tests ] && [ "$(find backend/tests -name '*.py' -type f | wc -l)" -gt 0 ]; then
            pytest backend/tests/ -v
          else
            echo "No backend tests found. Skipping pytest."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend/ev_route_planner
      - run: npm run build
        working-directory: frontend/ev_route_planner
